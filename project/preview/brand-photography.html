<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--paper);font-family:var(--font-body);color:var(--fg1)}
body{padding:20px 24px}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.ph{position:relative;aspect-ratio:3/2;border-radius:var(--r-sm);overflow:hidden;border:1px solid var(--border)}
.ph img{width:100%;height:100%;object-fit:cover;display:block}
.note{margin-top:13px;font-family:var(--font-mono);font-size:12px;color:var(--fg2)}
.note b{color:var(--brand-ink)}
</style></head><body>
<div class="grid">
  <div class="ph"><img src="../assets/photos/why-msm.jpg" alt=""></div>
  <div class="ph"><img src="../assets/photos/machinery-breakdown-service.jpg" alt=""></div>
  <div class="ph"><img src="../assets/photos/cad-design-development.jpg" alt=""></div>
  <div class="ph"><img src="../assets/photos/spare-parts.jpg" alt=""></div>
</div>
<div class="note"><b>Photography</b> — real shop-floor &amp; machinery imagery · warm, contrasty, slightly desaturated · hands-on, never cold/blue · use a dark scrim for overlaid text</div>
</body></html>
