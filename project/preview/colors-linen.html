<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--paper);font-family:var(--font-body);color:var(--fg1)}
body{padding:22px 24px}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
.col{display:flex;flex-direction:column;gap:4px}
.lbl{font-family:var(--font-mono);font-size:11px;color:var(--fg3);letter-spacing:.02em}
.sw{height:54px;border-radius:var(--r-sm);border:1px solid rgba(0,0,0,.06)}
.sw{width:120px;height:64px}
</style></head><body>
<div class="row">

<div class="col"><div class="sw" style="background:var(--linen-200)"></div><div class="lbl">linen-200</div></div>
<div class="col"><div class="sw" style="background:var(--linen-100)"></div><div class="lbl">linen-100</div></div>
<div class="col"><div class="sw" style="background:var(--linen-50)"></div><div class="lbl">linen-50</div></div>
<div class="col"><div class="sw" style="background:var(--paper)"></div><div class="lbl">paper</div></div>
<div class="col"><div class="sw" style="background:var(--white)"></div><div class="lbl">white</div></div>
</div>
<div style="margin-top:14px;font-family:var(--font-mono);font-size:12px;color:var(--fg2)">Warm linen surfaces — paper #FAF7F1 is the default page ground</div></body></html>
