<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--paper);font-family:var(--font-body);color:var(--fg1)}
body{padding:22px 24px;display:flex;gap:20px}
.svc{position:relative;overflow:hidden;background:var(--white);border:1px solid var(--border);border-radius:var(--r-md);padding:24px;width:300px}
.svc::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:var(--brand);transform:scaleX(0);transform-origin:left;transition:transform .25s ease}
.svc.hot{transform:translateY(-4px);box-shadow:var(--shadow-md);border-color:var(--border-strong)}
.svc.hot::before{transform:scaleX(1)}
.top{display:flex;align-items:flex-start;justify-content:space-between}
.ic{width:48px;height:48px;border-radius:var(--r-sm);background:var(--orange-50);display:flex;align-items:center;justify-content:center}
.ic svg{width:24px;height:24px;color:var(--brand);stroke-width:1.85}
.idx{font-family:var(--font-mono);font-size:13px;color:var(--fg3);letter-spacing:.05em}
h3{font-family:var(--font-display);font-weight:500;font-size:20px;margin:16px 0 0;color:var(--fg1)}
p{font-size:14px;line-height:1.55;color:var(--fg2);margin-top:8px}
.more{display:inline-flex;align-items:center;gap:7px;margin-top:16px;font-family:var(--font-display);font-weight:600;font-size:14px;color:var(--brand-ink)}
.more svg{width:15px;height:15px}
</style></head><body>
<div class="svc hot">
  <div class="top">
    <div class="ic"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.85" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg></div>
    <span class="idx">01</span>
  </div>
  <h3>Machinery Breakdown</h3>
  <p>On call to get you back online and minimise production down time.</p>
  <span class="more">Learn more <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg></span>
</div>
<div class="svc">
  <div class="top">
    <div class="ic" style="background:var(--linen-100)"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="var(--fg2)" stroke-width="1.85" stroke-linecap="round" stroke-linejoin="round"><path d="M21.3 15.3a2.4 2.4 0 0 1 0 3.4l-2.6 2.6a2.4 2.4 0 0 1-3.4 0L2.7 8.7a2.41 2.41 0 0 1 0-3.4l2.6-2.6a2.41 2.41 0 0 1 3.4 0Z"/><path d="m14.5 12.5 2-2"/><path d="m11.5 9.5 2-2"/><path d="m8.5 6.5 2-2"/></svg></div>
    <span class="idx">03</span>
  </div>
  <h3>Design &amp; Development</h3>
  <p>3D modelling &amp; CAD — from one-off parts to full machine builds.</p>
  <span class="more" style="color:var(--fg2)">Learn more <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg></span>
</div>
</body></html>
