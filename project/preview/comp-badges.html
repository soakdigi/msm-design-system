<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--paper);font-family:var(--font-body);color:var(--fg1)}
body{padding:22px 24px}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
.col{display:flex;flex-direction:column;gap:4px}
.lbl{font-family:var(--font-mono);font-size:11px;color:var(--fg3);letter-spacing:.02em}
.sw{height:54px;border-radius:var(--r-sm);border:1px solid rgba(0,0,0,.06)}
.badge{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;padding:5px 11px;border-radius:var(--r-pill);font-family:var(--font-display)}
.chip{display:inline-flex;font-size:13px;padding:7px 13px;border-radius:var(--r-pill);border:1px solid var(--border-strong);color:var(--fg2);background:var(--white)}
</style></head><body>
<div class="row" style="gap:10px;align-items:center">
<span class="badge" style="background:var(--ok-bg);color:var(--ok)">● Online</span>
<span class="badge" style="background:var(--danger-bg);color:var(--danger)">● Down</span>
<span class="badge" style="background:var(--warn-bg);color:var(--warn)">● Due soon</span>
<span class="badge" style="background:var(--orange-500);color:#fff">24/7</span>
</div>
<div class="row" style="gap:10px;margin-top:14px">
<span class="chip">Printing</span><span class="chip">Packaging</span><span class="chip">Furniture</span><span class="chip">Timber</span>
</div></body></html>
