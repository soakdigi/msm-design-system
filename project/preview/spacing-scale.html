<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--paper);font-family:var(--font-body);color:var(--fg1)}
body{padding:22px 24px}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
.col{display:flex;flex-direction:column;gap:4px}
.lbl{font-family:var(--font-mono);font-size:11px;color:var(--fg3);letter-spacing:.02em}
.sw{height:54px;border-radius:var(--r-sm);border:1px solid rgba(0,0,0,.06)}
.bar{height:18px;background:var(--brand);border-radius:2px}
</style></head><body>
<div class="col" style="gap:9px">

<div style="display:flex;align-items:center;gap:12px"><span class="lbl" style="width:74px">s-1 · 4px</span><div class="bar" style="width:4px"></div></div>
<div style="display:flex;align-items:center;gap:12px"><span class="lbl" style="width:74px">s-2 · 8px</span><div class="bar" style="width:8px"></div></div>
<div style="display:flex;align-items:center;gap:12px"><span class="lbl" style="width:74px">s-3 · 12px</span><div class="bar" style="width:12px"></div></div>
<div style="display:flex;align-items:center;gap:12px"><span class="lbl" style="width:74px">s-4 · 16px</span><div class="bar" style="width:16px"></div></div>
<div style="display:flex;align-items:center;gap:12px"><span class="lbl" style="width:74px">s-5 · 24px</span><div class="bar" style="width:24px"></div></div>
<div style="display:flex;align-items:center;gap:12px"><span class="lbl" style="width:74px">s-6 · 32px</span><div class="bar" style="width:32px"></div></div>
<div style="display:flex;align-items:center;gap:12px"><span class="lbl" style="width:74px">s-7 · 48px</span><div class="bar" style="width:48px"></div></div>
<div style="display:flex;align-items:center;gap:12px"><span class="lbl" style="width:74px">s-8 · 64px</span><div class="bar" style="width:64px"></div></div>
</div></body></html>
