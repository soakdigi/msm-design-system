<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--paper);font-family:var(--font-body);color:var(--fg1)}
body{padding:22px 24px}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
.col{display:flex;flex-direction:column;gap:4px}
.lbl{font-family:var(--font-mono);font-size:11px;color:var(--fg3);letter-spacing:.02em}
.sw{height:54px;border-radius:var(--r-sm);border:1px solid rgba(0,0,0,.06)}
.sw{width:84px}
</style></head><body>
<div class="row">

<div class="col"><div class="sw" style="background:var(--orange-50)"></div><div class="lbl">50</div></div>
<div class="col"><div class="sw" style="background:var(--orange-100)"></div><div class="lbl">100</div></div>
<div class="col"><div class="sw" style="background:var(--orange-200)"></div><div class="lbl">200</div></div>
<div class="col"><div class="sw" style="background:var(--orange-300)"></div><div class="lbl">300</div></div>
<div class="col"><div class="sw" style="background:var(--orange-400)"></div><div class="lbl">400</div></div>
<div class="col"><div class="sw" style="background:var(--orange-500)"></div><div class="lbl">500</div></div>
<div class="col"><div class="sw" style="background:var(--orange-600)"></div><div class="lbl">600</div></div>
<div class="col"><div class="sw" style="background:var(--orange-700)"></div><div class="lbl">700</div></div>
<div class="col"><div class="sw" style="background:var(--orange-800)"></div><div class="lbl">800</div></div>
<div class="col"><div class="sw" style="background:var(--orange-900)"></div><div class="lbl">900</div></div>
</div>
<div style="margin-top:14px;font-family:var(--font-mono);font-size:12px;color:var(--fg2)">orange-500 · <b style="color:var(--brand-ink)">#F05A3C</b> · rgb(240,90,60) — brand primary</div></body></html>
