<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--paper);font-family:var(--font-body);color:var(--fg1)}
body{padding:22px 24px}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
.col{display:flex;flex-direction:column;gap:4px}
.lbl{font-family:var(--font-mono);font-size:11px;color:var(--fg3);letter-spacing:.02em}
.sw{height:54px;border-radius:var(--r-sm);border:1px solid rgba(0,0,0,.06)}
.b{background:var(--linen-100);border:1px solid var(--border-strong);width:84px;height:60px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:6px}
</style></head><body>
<div class="row">

<div class="col"><div class="b" style="border-radius:var(--r-xs)"></div><div class="lbl">xs</div></div>
<div class="col"><div class="b" style="border-radius:var(--r-sm)"></div><div class="lbl">sm</div></div>
<div class="col"><div class="b" style="border-radius:var(--r-md)"></div><div class="lbl">md</div></div>
<div class="col"><div class="b" style="border-radius:var(--r-lg)"></div><div class="lbl">lg</div></div>
<div class="col"><div class="b" style="border-radius:var(--r-xl)"></div><div class="lbl">xl</div></div>
<div class="col"><div class="b" style="border-radius:var(--r-pill)"></div><div class="lbl">pill</div></div>
</div></body></html>
