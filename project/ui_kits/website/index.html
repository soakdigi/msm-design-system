<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MSM — Machinery Solutions &amp; Maintenance</title>
<link rel="icon" type="image/png" href="../../assets/logo/msm-mark-light.png">
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="stylesheet" href="site.css">
<style>
/* Mobile nav drawer (kit-local) */
.mnav{position:fixed;inset:0;z-index:200;display:none}
.mnav.open{display:block}
.mnav-scrim{position:absolute;inset:0;background:rgba(28,25,22,.55);backdrop-filter:blur(3px);opacity:0;transition:opacity .3s var(--ease)}
.mnav.open .mnav-scrim{opacity:1}
.mnav-panel{position:absolute;top:0;right:0;bottom:0;width:min(82vw,340px);background:var(--paper);box-shadow:var(--shadow-lg);
  padding:24px;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .32s var(--ease)}
.mnav.open .mnav-panel{transform:none}
.mnav-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:30px}
.mnav-top img{height:34px}
.mnav-close{background:none;border:none;cursor:pointer;color:var(--fg1)}
.mnav-links{display:flex;flex-direction:column;gap:4px}
.mnav-links a{font-family:var(--font-display);font-weight:600;font-size:20px;color:var(--fg1);padding:14px 0;border-bottom:1px solid var(--border)}
.mnav-links a:hover{color:var(--brand-ink)}
.mnav .cta{margin-top:28px;justify-content:space-between}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="Icons.jsx"></script>
<script type="text/babel" src="Header.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="Services.jsx"></script>
<script type="text/babel" src="WhyMSM.jsx"></script>
<script type="text/babel" src="Contact.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>

<script type="text/babel">
function MobileNav({ open, onClose, onNav }) {
  const go = (id) => { onClose(); setTimeout(() => onNav(id), 60); };
  const link = (id, label) => (
    <a href={'#' + id} onClick={(e) => { e.preventDefault(); go(id); }}>{label}</a>
  );
  return (
    <div className={'mnav' + (open ? ' open' : '')} aria-hidden={!open}>
      <div className="mnav-scrim" onClick={onClose}></div>
      <div className="mnav-panel">
        <div className="mnav-top">
          <img src="../../assets/logo/msm-logo-dark.png" alt="MSM" />
          <button className="mnav-close" onClick={onClose} aria-label="Close"><Icon name="x" style={{ width: 26, height: 26 }} /></button>
        </div>
        <div className="mnav-links">
          {link('services', 'What We Do')}
          {link('why', 'Why MSM')}
          {link('contact', 'Get In Touch')}
        </div>
        <button className="cta" onClick={() => go('contact')}>
          <span className="lab">Get In Touch</span>
          <span className="cap"><Icon name="arrowRight" /></span>
        </button>
      </div>
    </div>
  );
}

function useReveal() {
  React.useEffect(() => {
    const els = document.querySelectorAll('.reveal');
    const io = new IntersectionObserver((entries) => {
      entries.forEach((e) => { if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); } });
    }, { threshold: 0.12 });
    els.forEach((el) => io.observe(el));
    return () => io.disconnect();
  });
}

function App() {
  const [menu, setMenu] = React.useState(false);
  useReveal();
  const nav = (id) => {
    const el = document.getElementById(id === 'top' ? 'top' : id);
    if (el) window.scrollTo({ top: id === 'top' ? 0 : el.getBoundingClientRect().top + window.scrollY - 84, behavior: 'smooth' });
  };
  return (
    <React.Fragment>
      <Header onNav={nav} onMenu={() => setMenu(true)} />
      <MobileNav open={menu} onClose={() => setMenu(false)} onNav={nav} />
      <main>
        <Hero onNav={nav} />
        <div className="reveal"><Services onNav={nav} /></div>
        <div className="reveal"><WhyMSM /></div>
        <div className="reveal"><Contact /></div>
      </main>
      <Footer onNav={nav} />
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
