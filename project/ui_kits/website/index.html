<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MSM — Machinery Solutions &amp; Maintenance</title>
<link rel="icon" type="image/png" href="../../assets/logo/msm-mark-light.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Raleway:ital,wght@0,100..900;1,100..900&family=IBM+Plex+Mono:wght@400;500;600&display=swap">
<style>
/* ============================================================
   MSM — Colors & Type foundations
   ============================================================ */
:root {
  --orange-50:  #fdeee9;
  --orange-100: #fbd8cd;
  --orange-200: #f7b3a0;
  --orange-300: #f48d73;
  --orange-400: #f27457;
  --orange-500: #f05a3c;
  --orange-600: #d84a2e;
  --orange-700: #b23a22;
  --orange-800: #872c1a;
  --orange-900: #5c1d11;

  --warm-950: #1c1916;
  --warm-900: #221e1a;
  --warm-850: #2b2622;
  --warm-800: #38322c;
  --warm-700: #4a433b;
  --warm-600: #635a50;
  --warm-500: #837868;
  --warm-400: #a89d8d;
  --warm-300: #c8bfb2;

  --linen-200: #ded5c9;
  --linen-150: #e8e0d6;
  --linen-100: #f1ebe2;
  --linen-50:  #f7f3ec;
  --paper:     #faf7f1;
  --white:     #ffffff;

  --bg:          var(--paper);
  --bg-raised:   var(--white);
  --bg-sunken:   var(--linen-100);
  --bg-inverse:  var(--warm-850);

  --fg1: var(--warm-950);
  --fg2: var(--warm-700);
  --fg3: var(--warm-500);
  --fg-inverse:   #f4efe7;
  --fg-inverse-2: #b9b0a3;

  --brand:       var(--orange-500);
  --brand-press: var(--orange-600);
  --brand-ink:   var(--orange-700);
  --on-brand:    #ffffff;

  --border:        #e4dbcf;
  --border-strong: #cabfb0;
  --border-dark:   #46403a;

  --ok:    #3f7d52;   --ok-bg:    #e6efe6;
  --warn:  #c8881f;   --warn-bg:  #fbeed2;
  --danger:#c0392b;   --danger-bg:#f9e2de;
  --info:  #2f6a86;   --info-bg:  #e2eef3;

  --r-xs: 3px;
  --r-sm: 5px;
  --r-md: 8px;
  --r-lg: 12px;
  --r-xl: 18px;
  --r-pill: 999px;

  --s-1: 4px;  --s-2: 8px;  --s-3: 12px; --s-4: 16px;
  --s-5: 24px; --s-6: 32px; --s-7: 48px; --s-8: 64px;
  --s-9: 96px; --s-10: 128px;

  --shadow-sm: 0 1px 2px rgba(28,25,22,.08), 0 1px 1px rgba(28,25,22,.04);
  --shadow-md: 0 4px 14px rgba(28,25,22,.10), 0 1px 3px rgba(28,25,22,.06);
  --shadow-lg: 0 18px 40px rgba(28,25,22,.16), 0 4px 12px rgba(28,25,22,.08);
  --shadow-brand: 0 10px 24px rgba(240,90,60,.30);

  --font-display: 'Raleway', system-ui, sans-serif;
  --font-body:    'Manrope', system-ui, sans-serif;
  --font-mono:    'IBM Plex Mono', ui-monospace, 'SF Mono', monospace;

  --ease: cubic-bezier(.2,.7,.3,1);
  --ease-out: cubic-bezier(.16,.84,.44,1);
  --dur-fast: .14s;
  --dur: .24s;
  --dur-slow: .4s;
}

/* ---- Type scale ---- */
.eyebrow {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 13px;
  line-height: 1.2;
  letter-spacing: .22em;
  text-transform: uppercase;
  color: var(--brand-ink);
}
h1, .h1 {
  font-family: var(--font-display);
  font-weight: 300;
  font-size: clamp(40px, 5.2vw, 68px);
  line-height: 1.04;
  letter-spacing: -.01em;
  color: var(--fg1);
}
h2, .h2 {
  font-family: var(--font-display);
  font-weight: 300;
  font-size: clamp(30px, 3.4vw, 44px);
  line-height: 1.1;
  letter-spacing: -.005em;
  color: var(--fg1);
}
h3, .h3 {
  font-family: var(--font-display);
  font-weight: 500;
  font-size: 24px;
  line-height: 1.18;
  color: var(--fg1);
}
h4, .h4 {
  font-family: var(--font-display);
  font-weight: 500;
  font-size: 19px;
  line-height: 1.25;
  color: var(--fg1);
}
.lead {
  font-family: var(--font-body);
  font-weight: 400;
  font-size: 20px;
  line-height: 1.55;
  color: var(--fg2);
}
p, .body {
  font-family: var(--font-body);
  font-weight: 400;
  font-size: 16px;
  line-height: 1.65;
  color: var(--fg2);
}
.small {
  font-size: 14px;
  line-height: 1.55;
  color: var(--fg3);
}
.mono, code, .spec {
  font-family: var(--font-mono);
  font-size: 13px;
  letter-spacing: .01em;
  color: var(--fg1);
}
.wordmark {
  font-family: var(--font-display);
  font-weight: 300;
  text-transform: uppercase;
  letter-spacing: .26em;
}

/* ============================================================
   MSM marketing website — site styles
   ============================================================ */
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--paper);color:var(--fg1);font-family:var(--font-body);-webkit-font-smoothing:antialiased}
img{display:block;max-width:100%}
a{color:inherit;text-decoration:none}
.wrap{max-width:1200px;margin:0 auto;padding:0 32px}

/* ---------- Header ---------- */
.hdr{position:fixed;top:0;left:0;right:0;z-index:50;transition:background var(--dur) var(--ease),box-shadow var(--dur) var(--ease),border-color var(--dur)}
.hdr-inner{display:flex;align-items:center;justify-content:space-between;height:84px}
.hdr::after{content:"";position:absolute;inset:0;border-bottom:1px solid transparent;pointer-events:none;transition:border-color var(--dur)}
.hdr.scrolled{background:rgba(250,247,241,.85);backdrop-filter:blur(14px);box-shadow:var(--shadow-sm)}
.hdr.scrolled::after{border-bottom-color:var(--border)}
.hdr-logo{height:52px;transition:height var(--dur) var(--ease)}
.hdr.scrolled .hdr-logo.is-mark{height:40px}
.nav{display:flex;align-items:center;gap:38px}
.nav a{font-family:var(--font-display);font-weight:600;font-size:15px;color:rgba(255,255,255,.82);position:relative;padding:4px 0;transition:color var(--dur-fast)}
.nav a:hover{color:#fff}
.nav a::after{content:"";position:absolute;left:0;right:100%;bottom:-3px;height:2px;background:var(--brand);transition:right var(--dur) var(--ease)}
.nav a:hover::after{right:0}
.hdr.scrolled .nav a{color:var(--fg2)}
.hdr.scrolled .nav a:hover{color:var(--fg1)}
.hdr-cta{display:flex;align-items:center;gap:14px}
.menu-btn{display:none;background:none;border:none;cursor:pointer;color:#fff}
.hdr.scrolled .menu-btn{color:var(--fg1)}

/* ---------- Buttons ---------- */
.btn{display:inline-flex;align-items:center;gap:9px;font-family:var(--font-display);font-weight:600;font-size:15px;cursor:pointer;border-radius:var(--r-sm);padding:13px 24px;border:1px solid transparent;transition:background var(--dur-fast),transform var(--dur-fast),box-shadow var(--dur-fast),border-color var(--dur-fast),color var(--dur-fast);white-space:nowrap}
.btn svg{width:18px;height:18px}
.btn-ghost-light{background:transparent;color:#fff;border:1.5px solid rgba(255,255,255,.55);text-transform:uppercase;letter-spacing:.12em;font-weight:700;font-size:14px}
.btn-ghost-light:hover{background:#fff;color:var(--warm-850);border-color:#fff}
.btn-ghost-light:active{transform:translateY(1px)}

/* Signature CTA — badge arrow */
.cta{display:inline-flex;align-items:center;gap:20px;border:none;cursor:pointer;border-radius:var(--r-md);
  padding:9px 9px 9px 28px;background:var(--brand);color:#fff;box-shadow:var(--shadow-brand);font-family:var(--font-display);
  transition:transform .2s var(--ease),box-shadow .2s,background .2s}
.cta .lab{font-weight:700;font-size:15px;letter-spacing:.13em;text-transform:uppercase;white-space:nowrap}
.cta .cap{width:48px;height:48px;border-radius:var(--r-sm);background:rgba(20,12,8,.22);
  display:flex;align-items:center;justify-content:center;transition:background .2s,transform .2s}
.cta .cap svg{width:20px;height:20px;transition:transform .25s var(--ease)}
.cta:hover{transform:translateY(-3px);box-shadow:0 16px 34px rgba(240,90,60,.42)}
.cta:hover .cap{background:rgba(20,12,8,.34)}
.cta:hover .cap svg{transform:translateX(4px)}
.cta:active{transform:translateY(0);box-shadow:var(--shadow-sm)}
.cta-sm{padding:6px 6px 6px 22px;gap:14px}
.cta-sm .lab{font-size:13px;letter-spacing:.12em}
.cta-sm .cap{width:38px;height:38px}
.cta-sm .cap svg{width:17px;height:17px}

/* ---------- Hero (full-bleed) ---------- */
.hero{position:relative;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;color:#fff;overflow:hidden;padding:120px 24px 80px}
.hero-bg{position:absolute;inset:0;z-index:0}
.hero-bg img{width:100%;height:100%;object-fit:cover}
.hero-bg::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(20,17,14,.62) 0%,rgba(20,17,14,.42) 38%,rgba(20,17,14,.66) 100%)}
.hero-inner{position:relative;z-index:2;max-width:880px}
.hero-eyebrow{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:26px}
.hero-eyebrow .eyebrow{color:#fff}
.hero-eyebrow .dash{width:34px;height:2px;background:var(--brand)}
.hero h1{color:#fff;font-size:clamp(46px,7vw,92px);font-weight:200;letter-spacing:-.015em;line-height:1.02;text-shadow:0 2px 30px rgba(0,0,0,.25)}
.hero .lead{color:rgba(255,255,255,.9);margin:26px auto 0;max-width:600px;font-size:19px}
.hero-ctas{display:flex;gap:16px;justify-content:center;margin-top:40px;flex-wrap:wrap}
.hero-scroll{position:absolute;left:50%;bottom:30px;transform:translateX(-50%);z-index:2;background:none;border:none;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:7px;color:rgba(255,255,255,.7);font-family:var(--font-display);
  font-size:11px;text-transform:uppercase;letter-spacing:.22em;transition:color var(--dur-fast)}
.hero-scroll:hover{color:#fff}
.hero-scroll svg{width:20px;height:20px;animation:nudge 1.8s var(--ease) infinite}
@keyframes nudge{0%,100%{transform:translateY(0)}50%{transform:translateY(5px)}}

/* ---------- Section heading ---------- */
.sec-head{max-width:720px}
.sec-head h2{margin:14px 0 0}
.sec-head .lead{margin:18px 0 0}
.center{margin-left:auto;margin-right:auto;text-align:center}

/* ---------- Services (alternating full-bleed rows) ---------- */
.services{padding:110px 0 124px}
.svc-rows{margin-top:80px;display:flex;flex-direction:column;gap:0}
.svc-row{display:grid;grid-template-columns:1fr 1fr;align-items:stretch;min-height:540px}
.svc-media{position:relative;overflow:hidden}
.svc-media img{width:100%;height:100%;min-height:540px;object-fit:cover;display:block}
.svc-row.flip .svc-media{order:2}
.svc-text{display:flex;flex-direction:column;justify-content:center;padding:80px clamp(56px,7%,96px)}
.svc-row.flip .svc-text{padding:80px clamp(56px,7%,96px)}
.svc-ic{display:flex;align-items:center;margin-bottom:20px}
.svc-ic svg{width:36px;height:36px;color:var(--brand);stroke-width:1.6}
.svc-text h3{font-size:clamp(26px,2.4vw,34px);font-weight:500;line-height:1.12}
.svc-text p{margin-top:18px;font-size:17px;line-height:1.7;color:var(--fg2);max-width:540px}

/* ---------- Why MSM (full-bleed band) ---------- */
.why{position:relative;overflow:hidden;color:#fff;padding:140px 0}
.why-bg{position:absolute;inset:0;z-index:0}
.why-bg img{width:100%;height:100%;object-fit:cover}
.why-bg::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,rgba(20,17,14,.86) 0%,rgba(20,17,14,.72) 46%,rgba(20,17,14,.34) 100%)}
.why-inner{position:relative;z-index:2;max-width:660px}
.why-inner .eyebrow{color:var(--brand)}
.why-inner h2{color:#fff;margin-top:14px;font-size:clamp(36px,4.2vw,54px)}
.why-inner .lead{color:rgba(255,255,255,.88);margin-top:20px}
.why-ind{margin-top:36px}
.why-ind-lbl{font-family:var(--font-display);font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.18em;color:rgba(255,255,255,.6)}
.chips{display:flex;flex-wrap:wrap;gap:10px;margin-top:14px}
.chip{font-family:var(--font-display);font-weight:600;font-size:14px;color:#fff;border:1px solid rgba(255,255,255,.28);border-radius:var(--r-pill);padding:9px 18px;background:rgba(255,255,255,.06)}

/* ---------- Contact (over map) ---------- */
.contact{position:relative;padding:96px 0;background:var(--linen-100)}
.contact-map{position:absolute;inset:0;z-index:0}
.contact-map iframe{width:100%;height:100%;border:0;filter:grayscale(.35) contrast(1.02)}
.contact-map::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,rgba(241,235,226,.55) 0%,rgba(241,235,226,0) 60%);pointer-events:none}
.contact-wrap{position:relative;z-index:2}
.contact-card{background:var(--warm-850);color:#fff;border-radius:var(--r-lg);padding:48px 44px;max-width:480px;box-shadow:var(--shadow-lg)}
.contact-card .eyebrow{color:var(--brand)}
.contact-card h2{color:#fff;margin-top:12px;font-size:clamp(30px,3.2vw,42px)}
.contact-card>p{color:var(--fg-inverse-2);margin-top:16px;font-size:16px;line-height:1.6}
.cinfo{margin:28px 0 30px}
.cinfo .detail{display:flex;gap:15px;align-items:flex-start;padding:16px 0;border-bottom:1px solid var(--border-dark)}
.cinfo .detail:first-child{border-top:1px solid var(--border-dark)}
.cinfo a.detail{transition:opacity var(--dur-fast)}
.cinfo a.detail:hover{opacity:.8}
.cinfo .detail svg{width:22px;height:22px;color:var(--brand);flex:none;margin-top:2px;stroke-width:1.85}
.cinfo .detail .k{font-size:12px;color:var(--fg-inverse-2);text-transform:uppercase;letter-spacing:.12em;font-weight:600}
.cinfo .detail .v{font-family:var(--font-mono);font-size:17px;color:#fff;margin-top:4px}
.cinfo .detail .v.plain{font-family:var(--font-body);font-size:16px;line-height:1.4;white-space:pre-line}

/* ---------- Footer ---------- */
.footer{background:var(--warm-950);color:var(--fg-inverse-2);padding:64px 0 30px}
.footer-grid{display:grid;grid-template-columns:1.5fr 1fr 1fr;gap:48px}
.footer-logo{height:44px;margin-bottom:20px}
.footer h5{color:#fff;font-family:var(--font-display);font-weight:700;font-size:14px;text-transform:uppercase;letter-spacing:.14em;margin-bottom:16px}
.footer a,.footer p{font-size:15px;line-height:1.9;color:var(--fg-inverse-2)}
.footer a:hover{color:var(--brand)}
.footer .flist{display:flex;flex-direction:column}
.footer-bot{margin-top:50px;padding-top:24px;border-top:1px solid var(--border-dark);display:flex;justify-content:space-between;align-items:center;font-size:13px;color:var(--warm-500)}
.footer .tag{font-family:var(--font-body);max-width:300px}

/* ---------- Mobile nav drawer ---------- */
.mnav{position:fixed;inset:0;z-index:200;display:none}
.mnav.open{display:block}
.mnav-scrim{position:absolute;inset:0;background:rgba(28,25,22,.55);backdrop-filter:blur(3px);opacity:0;transition:opacity .3s var(--ease)}
.mnav.open .mnav-scrim{opacity:1}
.mnav-panel{position:absolute;top:0;right:0;bottom:0;width:min(82vw,340px);background:var(--paper);box-shadow:var(--shadow-lg);
  padding:24px;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .32s var(--ease)}
.mnav.open .mnav-panel{transform:none}
.mnav-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:30px}
.mnav-top img{height:34px}
.mnav-close{background:none;border:none;cursor:pointer;color:var(--fg1)}
.mnav-links{display:flex;flex-direction:column;gap:4px}
.mnav-links a{font-family:var(--font-display);font-weight:600;font-size:20px;color:var(--fg1);padding:14px 0;border-bottom:1px solid var(--border)}
.mnav-links a:hover{color:var(--brand-ink)}
.mnav .cta{margin-top:28px;justify-content:space-between}

/* ---------- Reveal animation ---------- */
.reveal{opacity:0;transform:translateY(16px);transition:opacity .6s var(--ease-out),transform .6s var(--ease-out)}
.reveal.in{opacity:1;transform:none}

/* ---------- Service row stagger ---------- */
.svc-row .svc-media,.svc-row .svc-text{opacity:0;transform:translateY(32px);transition:opacity .65s var(--ease-out),transform .65s var(--ease-out)}
.svc-row.in .svc-media{opacity:1;transform:none;transition-delay:.05s}
.svc-row.in .svc-text{opacity:1;transform:none;transition-delay:.2s}

/* ---------- Parallax ---------- */
.hero-bg img,.why-bg img{will-change:transform}

/* ---------- Mobile ---------- */
@media(max-width:920px){
  .svc-row{grid-template-columns:1fr;min-height:0;border-bottom:1px solid var(--border)}
  .svc-row.flip .svc-media{order:0}
  .svc-media img{min-height:360px;max-height:440px}
  .svc-text,.svc-row.flip .svc-text{padding:40px 32px 52px}
  .svc-text p{max-width:none}
  .footer-grid{grid-template-columns:1fr 1fr}
  .contact-card{max-width:none}
}
@media(max-width:680px){
  .wrap{padding:0 22px}
  .nav,.hdr-cta .cta{display:none}
  .menu-btn{display:flex}
  .services{padding:80px 0 88px}
  .svc-rows{margin-top:56px}
  .svc-media img{min-height:300px;max-height:360px}
  .svc-text,.svc-row.flip .svc-text{padding:32px 22px 4px}
  .why{padding:96px 0}
  .why-bg::after{background:linear-gradient(180deg,rgba(20,17,14,.72) 0%,rgba(20,17,14,.82) 100%)}
  .contact-card{padding:36px 28px}
  .footer-grid{grid-template-columns:1fr}
}
</style>
</head>

/* ---- Reveal + stagger + parallax ---- */
function useReveal() {
  React.useEffect(() => {
    // Section reveal
    const revealEls = document.querySelectorAll('.reveal');
    const revealIO = new IntersectionObserver((entries) => {
      entries.forEach((e) => {
        if (e.isIntersecting) { e.target.classList.add('in'); revealIO.unobserve(e.target); }
      });
    }, { threshold: 0.12 });
    revealEls.forEach((el) => revealIO.observe(el));

    // Service row stagger — each row triggers independently
    const rows = document.querySelectorAll('.svc-row');
    const rowIO = new IntersectionObserver((entries) => {
      entries.forEach((e) => {
        if (e.isIntersecting) { e.target.classList.add('in'); rowIO.unobserve(e.target); }
      });
    }, { threshold: 0.15 });
    rows.forEach((r) => rowIO.observe(r));

    // Parallax on hero and why-msm backgrounds
    const parallaxEls = [
      { img: document.querySelector('.hero-bg img'),  speed: 0.35 },
      { img: document.querySelector('.why-bg img'),   speed: 0.28 },
    ];
    let ticking = false;
    const onScroll = () => {
      if (ticking) return;
      ticking = true;
      requestAnimationFrame(() => {
        parallaxEls.forEach(({ img, speed }) => {
          if (!img) return;
          const rect = img.closest('section').getBoundingClientRect();
          const offset = -(rect.top * speed);
          img.style.transform = `translateY(${offset}px) scale(1.12)`;
        });
        ticking = false;
      });
    };
    window.addEventListener('scroll', onScroll, { passive: true });
    onScroll();

    return () => {
      revealIO.disconnect();
      rowIO.disconnect();
      window.removeEventListener('scroll', onScroll);
    };
  });
}

    }
  };

  return (
    <React.Fragment>
      <Header onNav={nav} onMenu={() => setMenu(true)} />
      <MobileNav open={menu} onClose={() => setMenu(false)} onNav={nav} />
      <main>

        <div className="reveal"><WhyMSM /></div>

    </React.Fragment>
  );
}
